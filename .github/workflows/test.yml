name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: go test ./...
      - run: go vet ./...
      - run: node --check web/static/board.js
      - run: node --check web/static/admin.js
